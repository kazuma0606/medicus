version: '3.8'

services:
  medicus-api:
    build:
      context: ..
      dockerfile: medicus-api/Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - YESOD_ENV=development
      - PORT=3000
      - LOG_LEVEL=DEBUG
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped

networks:
  default:
    name: medicus-network
